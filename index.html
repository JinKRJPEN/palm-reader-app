<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Palm Insight</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Pretendard', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            50: '#f6f6f6',
                            100: '#e7e7e7',
                            200: '#d1d1d1',
                            300: '#b0b0b0',
                            400: '#888888',
                            500: '#6d6d6d',
                            600: '#5d5d5d',
                            700: '#4f4f4f',
                            800: '#353535',
                            900: '#1a1a1a',
                            950: '#0a0a0a',
                        }
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-brand-950 text-brand-50 min-h-screen flex flex-col font-sans selection:bg-brand-500 selection:text-white">
    <header class="py-5 px-6 flex justify-center items-center border-b border-brand-800/50 backdrop-blur-md sticky top-0 z-20">
        <h1 class="text-[13px] font-medium tracking-[0.3em] text-brand-300">PALM INSIGHT</h1>
    </header>

    <main class="flex-grow flex flex-col items-center justify-center p-6 relative w-full max-w-md mx-auto">
        
        <!-- 메인 업로드 화면 -->
        <section id="upload-section" class="w-full flex flex-col items-center space-y-10 transition-opacity duration-500 z-10">
            <div class="text-center space-y-3 mt-4">
                <h2 class="text-xl font-light tracking-widest text-brand-100">손금 분석의 새로운 기준</h2>
                <p class="text-brand-400 text-xs font-light tracking-wide leading-relaxed">손바닥의 미세한 선들을 읽어<br>숨겨진 잠재력을 데이터로 시각화합니다.</p>
            </div>

            <div class="relative w-full aspect-square border border-brand-800 border-dashed rounded-[2rem] flex flex-col items-center justify-center hover:bg-brand-900/50 hover:border-brand-600 transition-all duration-300 group overflow-hidden cursor-pointer" id="upload-area" onclick="document.getElementById('camera-input').click()">
                <div class="absolute inset-0 bg-gradient-to-b from-transparent to-brand-900/30 opacity-0 group-hover:opacity-100 transition-opacity"></div>
                <svg class="w-8 h-8 text-brand-500 mb-4 group-hover:text-brand-300 group-hover:scale-110 transition-all duration-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1" d="M12 4v16m8-8H4"></path></svg>
                <span class="text-[11px] uppercase tracking-widest text-brand-500 group-hover:text-brand-300 transition-colors">Tap to Upload</span>
                <input type="file" id="camera-input" accept="image/*" class="hidden" onchange="handleImageUpload(event)">
            </div>

            <!-- API 키 입력부 (미니멀) -->
            <div class="w-full space-y-2 opacity-80 hover:opacity-100 transition-opacity">
                <label for="api-key" class="block text-[10px] uppercase tracking-widest text-brand-500 font-medium">Gemini API Key</label>
                <input type="password" id="api-key" placeholder="Enter your key" class="w-full bg-transparent border-b border-brand-800 py-3 text-brand-100 focus:outline-none focus:border-brand-400 transition-colors text-sm placeholder-brand-800">
            </div>
        </section>

        <!-- 로딩 화면 (미니멀) -->
        <section id="loading-section" class="hidden absolute inset-0 flex-col items-center justify-center bg-brand-950 z-20">
            <div class="w-full max-w-[160px] h-[1px] bg-brand-800 overflow-hidden relative">
                <div class="absolute top-0 left-0 h-full bg-brand-300 animate-loading-bar"></div>
            </div>
            <p class="mt-6 text-[10px] uppercase tracking-[0.4em] text-brand-400 font-light" id="loading-text">ANALYZING LINES</p>
        </section>

        <!-- 결과 화면 -->
        <section id="result-section" class="hidden w-full flex-col space-y-10 pb-12 z-10 fade-in pt-4">
            
            <div class="relative w-full aspect-square rounded-[2rem] overflow-hidden bg-brand-900">
                <img id="preview-image" src="" alt="Analyzed Palm" class="w-full h-full object-cover opacity-50 mix-blend-luminosity grayscale">
                <div class="absolute inset-0 border border-brand-800/50 rounded-[2rem]"></div>
                <div class="absolute top-6 left-6">
                    <span class="text-[9px] uppercase tracking-[0.2em] bg-brand-950/90 px-4 py-2 rounded-full text-brand-400 backdrop-blur-md border border-brand-800/50">Analysis Complete</span>
                </div>
            </div>

            <div class="space-y-10">
                <div class="space-y-6">
                    <div class="border-b border-brand-800 pb-3">
                        <h3 class="text-[10px] uppercase tracking-widest text-brand-500 mb-1">Index</h3>
                        <p class="text-sm font-medium text-brand-200 tracking-wide">잠재력 지표</p>
                    </div>
                    
                    <!-- Stats with minimal design -->
                    <div class="space-y-6">
                        <div class="group">
                            <div class="flex justify-between mb-2 text-[11px] font-light uppercase tracking-wider">
                                <span class="text-brand-400">Vitality <span class="text-brand-600 ml-1">생명</span></span>
                                <span class="text-brand-100" id="stat-vitality-val">0</span>
                            </div>
                            <div class="w-full bg-brand-900 h-[1px] overflow-hidden">
                                <div id="stat-vitality" class="bg-brand-300 h-full transition-all duration-1000 ease-out" style="width: 0%"></div>
                            </div>
                        </div>
                        
                        <div class="group">
                            <div class="flex justify-between mb-2 text-[11px] font-light uppercase tracking-wider">
                                <span class="text-brand-400">Intelligence <span class="text-brand-600 ml-1">두뇌</span></span>
                                <span class="text-brand-100" id="stat-intelligence-val">0</span>
                            </div>
                            <div class="w-full bg-brand-900 h-[1px] overflow-hidden">
                                <div id="stat-intelligence" class="bg-brand-300 h-full transition-all duration-1000 ease-out" style="width: 0%"></div>
                            </div>
                        </div>

                        <div class="group">
                            <div class="flex justify-between mb-2 text-[11px] font-light uppercase tracking-wider">
                                <span class="text-brand-400">Emotion <span class="text-brand-600 ml-1">감정</span></span>
                                <span class="text-brand-100" id="stat-charm-val">0</span>
                            </div>
                            <div class="w-full bg-brand-900 h-[1px] overflow-hidden">
                                <div id="stat-charm" class="bg-brand-300 h-full transition-all duration-1000 ease-out" style="width: 0%"></div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="space-y-5">
                    <div class="border-b border-brand-800 pb-3">
                        <h3 class="text-[10px] uppercase tracking-widest text-brand-500 mb-1">Insight</h3>
                        <p class="text-sm font-medium text-brand-200 tracking-wide">상세 분석</p>
                    </div>
                    <div id="result-text" class="text-brand-300 text-[14px] leading-[1.8] font-light whitespace-pre-line tracking-wide opacity-90">
                    </div>
                </div>
            </div>

            <button onclick="resetApp()" class="w-full py-4 mt-4 bg-brand-100 text-brand-950 hover:bg-white rounded-2xl font-medium text-[13px] tracking-wide transition-all active:scale-[0.98]">
                새로운 분석 시작
            </button>
        </section>
    </main>

    <script src="app.js?v=4"></script>
</body>
</html>
