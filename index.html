<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>신비한 손금 도사</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Noto Sans KR', 'sans-serif'],
                    },
                    colors: {
                        mystic: {
                            50: '#f5f3ff',
                            100: '#ede9fe',
                            200: '#ddd6fe',
                            300: '#c4b5fd',
                            400: '#a78bfa',
                            500: '#8b5cf6',
                            600: '#7c3aed',
                            700: '#6d28d9',
                            800: '#5b21b6',
                            900: '#4c1d95',
                        }
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-slate-900 text-white min-h-screen flex flex-col font-sans">
    <header class="p-6 text-center shadow-lg bg-slate-800/50 backdrop-blur-md sticky top-0 z-10">
        <h1 class="text-2xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-mystic-300 to-mystic-500">
            🔮 신비한 손금 도사
        </h1>
        <p class="text-slate-400 mt-2 text-sm">당신의 숨겨진 운명을 밝혀드립니다</p>
    </header>

    <main class="flex-grow flex flex-col items-center justify-center p-6 relative overflow-hidden">
        
        <!-- 배경 장식 -->
        <div class="absolute top-[-10%] left-[-10%] w-64 h-64 bg-mystic-700/20 rounded-full blur-3xl"></div>
        <div class="absolute bottom-[-10%] right-[-10%] w-64 h-64 bg-blue-700/20 rounded-full blur-3xl"></div>

        <!-- 메인 업로드 화면 -->
        <section id="upload-section" class="w-full max-w-md flex flex-col items-center space-y-6 transition-all duration-500 z-10">
            <div class="relative w-48 h-48 rounded-full bg-slate-800 border-4 border-mystic-500/30 flex items-center justify-center shadow-[0_0_40px_rgba(139,92,246,0.2)] mb-8 pulse-slow">
                <span class="text-6xl drop-shadow-[0_0_15px_rgba(255,255,255,0.5)]">✋</span>
            </div>
            
            <p class="text-center text-slate-300 mb-4 leading-relaxed">
                손바닥 전체가 잘 보이게<br>사진을 찍거나 업로드해주세요.
            </p>

            <div class="w-full space-y-4">
                <button onclick="document.getElementById('camera-input').click()" class="w-full py-4 bg-gradient-to-r from-mystic-600 to-mystic-500 hover:from-mystic-500 hover:to-mystic-400 rounded-2xl font-bold text-lg shadow-lg shadow-mystic-500/30 transition-all active:scale-95 flex items-center justify-center space-x-2">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                    <span>사진 찍기</span>
                </button>
                <input type="file" id="camera-input" accept="image/*" capture="environment" class="hidden" onchange="handleImageUpload(event)">
                
                <button onclick="document.getElementById('gallery-input').click()" class="w-full py-4 bg-slate-800 hover:bg-slate-700 border border-slate-700 rounded-2xl font-bold text-lg transition-all active:scale-95 flex items-center justify-center space-x-2">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                    <span>갤러리에서 선택</span>
                </button>
                <input type="file" id="gallery-input" accept="image/*" class="hidden" onchange="handleImageUpload(event)">
            </div>

            <!-- API 키 입력부 추가 -->
            <div class="w-full mt-6 p-4 bg-slate-800/80 backdrop-blur-sm rounded-2xl border border-slate-700 shadow-lg">
                <label for="api-key" class="block text-sm font-bold text-slate-300 mb-2 flex items-center">
                    <span class="mr-2">🔑</span> Gemini API Key (필수)
                </label>
                <input type="password" id="api-key" placeholder="AI Studio에서 발급받은 키 입력" class="w-full bg-slate-900/50 border border-slate-600 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-mystic-500 focus:ring-1 focus:ring-mystic-500 transition-all text-sm mb-2">
                <p class="text-xs text-slate-400 leading-relaxed">
                    구글 <a href="https://aistudio.google.com/app/apikey" target="_blank" class="text-mystic-400 hover:text-mystic-300 underline font-bold">AI Studio</a>에서 무료 발급 가능합니다.<br>
                    <span class="text-slate-500">* 키는 브라우저 내부에만 안전하게 저장됩니다.</span>
                </p>
            </div>
        </section>

        <!-- 로딩 화면 (신비로운 분위기) -->
        <section id="loading-section" class="hidden absolute inset-0 flex-col items-center justify-center bg-slate-900/95 z-20 backdrop-blur-md">
            <div class="relative w-32 h-32 flex items-center justify-center mb-6">
                <!-- 겹치는 원형 애니메이션 -->
                <div class="absolute inset-0 rounded-full border-t-4 border-mystic-400 animate-spin opacity-80"></div>
                <div class="absolute inset-2 rounded-full border-b-4 border-mystic-600 animate-spin-reverse opacity-70"></div>
                <div class="absolute inset-4 rounded-full border-r-4 border-mystic-300 animate-pulse opacity-60"></div>
                <span class="text-4xl animate-bounce drop-shadow-[0_0_10px_rgba(255,255,255,0.8)]">🔮</span>
            </div>
            <p class="text-xl font-bold text-mystic-300 tracking-wider" id="loading-text">운명의 선을 읽는 중...</p>
            <p class="text-sm text-slate-400 mt-3 animate-pulse">고도의 AI가 손금을 분석하고 있습니다</p>
        </section>

        <!-- 결과 화면 (RPG 스탯창 스타일) -->
        <section id="result-section" class="hidden w-full max-w-md flex-col space-y-6 pb-10 z-10 fade-in">
            <!-- 이미지 미리보기 영역 -->
            <div class="relative w-full aspect-square max-h-64 rounded-2xl overflow-hidden border-2 border-mystic-500/50 shadow-[0_0_30px_rgba(139,92,246,0.15)] bg-slate-800">
                <img id="preview-image" src="" alt="업로드된 손금" class="w-full h-full object-cover opacity-80 mix-blend-luminosity">
                <div class="absolute inset-0 bg-gradient-to-t from-slate-900 via-slate-900/40 to-transparent"></div>
                <div class="absolute bottom-4 left-4 right-4 text-center">
                    <p class="text-mystic-300 font-bold tracking-widest text-sm drop-shadow-md">ANALYSIS COMPLETE</p>
                </div>
            </div>

            <!-- 스탯 창 -->
            <div class="bg-slate-800/80 backdrop-blur-sm rounded-2xl p-6 border border-slate-700 shadow-xl relative overflow-hidden">
                <div class="absolute -top-4 -right-4 p-4 opacity-10 text-8xl">✨</div>
                <h2 class="text-2xl font-bold mb-6 flex items-center text-white">
                    <span class="mr-2">📊</span> 당신의 운명 스탯
                </h2>
                
                <div class="space-y-6">
                    <!-- 생명력 -->
                    <div>
                        <div class="flex justify-between mb-2">
                            <span class="font-bold text-red-400">❤️ 생명력 (생명선)</span>
                            <span class="text-red-400 font-mono text-lg font-bold" id="stat-vitality-val">0</span>
                        </div>
                        <div class="w-full bg-slate-900 rounded-full h-4 border border-slate-700 overflow-hidden shadow-inner">
                            <div id="stat-vitality" class="bg-gradient-to-r from-red-600 to-red-400 h-4 rounded-full transition-all duration-1000 ease-out shadow-[0_0_10px_rgba(248,113,113,0.5)]" style="width: 0%"></div>
                        </div>
                    </div>
                    
                    <!-- 지력 -->
                    <div>
                        <div class="flex justify-between mb-2">
                            <span class="font-bold text-blue-400">🧠 지력 (두뇌선)</span>
                            <span class="text-blue-400 font-mono text-lg font-bold" id="stat-intelligence-val">0</span>
                        </div>
                        <div class="w-full bg-slate-900 rounded-full h-4 border border-slate-700 overflow-hidden shadow-inner">
                            <div id="stat-intelligence" class="bg-gradient-to-r from-blue-600 to-blue-400 h-4 rounded-full transition-all duration-1000 ease-out shadow-[0_0_10px_rgba(96,165,250,0.5)]" style="width: 0%"></div>
                        </div>
                    </div>

                    <!-- 매력 -->
                    <div>
                        <div class="flex justify-between mb-2">
                            <span class="font-bold text-pink-400">✨ 매력 (감정선)</span>
                            <span class="text-pink-400 font-mono text-lg font-bold" id="stat-charm-val">0</span>
                        </div>
                        <div class="w-full bg-slate-900 rounded-full h-4 border border-slate-700 overflow-hidden shadow-inner">
                            <div id="stat-charm" class="bg-gradient-to-r from-pink-600 to-pink-400 h-4 rounded-full transition-all duration-1000 ease-out shadow-[0_0_10px_rgba(244,114,182,0.5)]" style="width: 0%"></div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 운세 풀이 영역 -->
            <div class="bg-slate-800/80 backdrop-blur-sm rounded-2xl p-6 border border-slate-700 shadow-xl">
                <h3 class="text-xl font-bold mb-4 text-mystic-300 flex items-center">
                    <span class="mr-2">📜</span> 도사의 풀이
                </h3>
                <div id="result-text" class="text-slate-200 leading-relaxed whitespace-pre-line text-[15px]">
                    (여기에 AI가 분석한 유쾌하고 긍정적인 운세 풀이가 나타납니다.)
                </div>
            </div>

            <button onclick="resetApp()" class="w-full py-4 bg-slate-700 hover:bg-slate-600 border border-slate-600 rounded-2xl font-bold text-lg transition-all mt-2 active:scale-95 shadow-lg">
                다시 보기
            </button>
        </section>
    </main>

    <script src="app.js?v=2"></script>
</body>
</html>
