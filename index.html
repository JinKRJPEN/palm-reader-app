<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Palm Insight</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Pretendard', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            50: '#f6f6f6',
                            100: '#e7e7e7',
                            200: '#d1d1d1',
                            300: '#b0b0b0',
                            400: '#888888',
                            500: '#6d6d6d',
                            600: '#5d5d5d',
                            700: '#4f4f4f',
                            800: '#353535',
                            900: '#1a1a1a',
                            950: '#0a0a0a',
                        }
                    }
                }
            }
        }
    </script>

    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-M48XG6Z5H8"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());

      gtag('config', 'G-M48XG6Z5H8');
    </script>
</head>
<body class="bg-brand-950 text-brand-50 min-h-screen flex flex-col font-sans selection:bg-brand-500 selection:text-white">
    <!-- Language Toggle -->
    <div class="absolute top-5 right-6 z-30 flex space-x-3 text-[11px] tracking-wider">
        <button onclick="setLanguage('en')" id="lang-en" class="lang-btn text-brand-600 transition-colors">EN</button>
        <button onclick="setLanguage('ko')" id="lang-ko" class="lang-btn text-brand-100 font-bold transition-colors">KO</button>
        <button onclick="setLanguage('ja')" id="lang-ja" class="lang-btn text-brand-600 transition-colors">JA</button>
    </div>

    <header class="py-5 px-6 flex justify-center items-center border-b border-brand-800/50 backdrop-blur-md sticky top-0 z-20">
        <h1 class="text-[13px] font-medium tracking-[0.3em] text-brand-300">PALM INSIGHT</h1>
    </header>

    <main class="flex-grow flex flex-col items-center justify-center p-6 relative w-full max-w-md mx-auto">
        
        <!-- 메인 업로드 화면 -->
        <section id="upload-section" class="w-full flex flex-col items-center space-y-8 transition-opacity duration-500 z-10">
            <div class="text-center space-y-3 mt-4">
                <h2 class="text-xl font-light tracking-widest text-brand-100" data-i18n="title">손금 분석의 새로운 기준</h2>
                <p class="text-brand-400 text-[13px] font-light tracking-wide leading-relaxed" data-i18n="subtitle">손바닥의 미세한 선들을 읽어<br>숨겨진 잠재력을 데이터로 시각화합니다.</p>
            </div>

            <!-- Mode Toggle Tabs -->
            <div class="flex space-x-1 bg-brand-900/80 p-1.5 rounded-2xl mt-2 w-full max-w-[280px] mx-auto border border-brand-800 backdrop-blur-sm shadow-xl shadow-black/20">
                <button onclick="setMode('quick')" id="mode-quick" class="flex-1 py-2.5 text-[11px] font-medium tracking-wide rounded-xl bg-brand-800 text-brand-100 transition-all shadow-sm" data-i18n="tab_quick">간편 스캔 (한 손)</button>
                <button onclick="setMode('deep')" id="mode-deep" class="flex-1 py-2.5 text-[11px] font-medium tracking-wide rounded-xl text-brand-500 hover:text-brand-300 transition-all" data-i18n="tab_deep">정밀 스캔 (양 손)</button>
            </div>

            <!-- Quick Mode Upload -->
            <div id="upload-quick-area" class="relative w-full aspect-square border border-brand-800 border-dashed rounded-[2rem] flex flex-col items-center justify-center hover:bg-brand-900/50 hover:border-brand-600 transition-all duration-300 group overflow-hidden cursor-pointer" onclick="document.getElementById('camera-input-quick').click()">
                <div class="absolute inset-0 bg-gradient-to-b from-transparent to-brand-900/30 opacity-0 group-hover:opacity-100 transition-opacity"></div>
                <svg class="w-8 h-8 text-brand-500 mb-4 group-hover:text-brand-300 group-hover:scale-110 transition-all duration-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1" d="M12 4v16m8-8H4"></path></svg>
                <span class="text-[11px] uppercase tracking-widest text-brand-500 group-hover:text-brand-300 transition-colors" data-i18n="upload_quick">Tap to Upload</span>
            </div>

            <!-- Deep Mode Upload -->
            <div id="upload-deep-area" class="hidden w-full flex-col space-y-4">
                <div class="flex space-x-4">
                    <div class="relative flex-1 aspect-[3/4] border border-brand-800 border-dashed rounded-[1.5rem] flex flex-col items-center justify-center text-center cursor-pointer hover:bg-brand-900/50 transition-colors group overflow-hidden" onclick="document.getElementById('camera-input-left').click()">
                        <img id="preview-left" class="absolute inset-0 w-full h-full object-cover opacity-0 transition-opacity z-0 grayscale mix-blend-luminosity">
                        <svg class="w-6 h-6 text-brand-600 mb-2 z-10 group-hover:scale-110 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1" d="M12 4v16m8-8H4"></path></svg>
                        <span class="text-[10px] text-brand-400 z-10 leading-relaxed font-light px-2" data-i18n="upload_left">왼손 업로드<br>(선천적)</span>
                        <div id="check-left" class="absolute top-3 right-3 w-5 h-5 bg-brand-200 rounded-full hidden items-center justify-center z-10 shadow-lg"><svg class="w-3 h-3 text-brand-950" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg></div>
                    </div>
                    <div class="relative flex-1 aspect-[3/4] border border-brand-800 border-dashed rounded-[1.5rem] flex flex-col items-center justify-center text-center cursor-pointer hover:bg-brand-900/50 transition-colors group overflow-hidden" onclick="document.getElementById('camera-input-right').click()">
                        <img id="preview-right" class="absolute inset-0 w-full h-full object-cover opacity-0 transition-opacity z-0 grayscale mix-blend-luminosity">
                        <svg class="w-6 h-6 text-brand-600 mb-2 z-10 group-hover:scale-110 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1" d="M12 4v16m8-8H4"></path></svg>
                        <span class="text-[10px] text-brand-400 z-10 leading-relaxed font-light px-2" data-i18n="upload_right">오른손 업로드<br>(후천적)</span>
                        <div id="check-right" class="absolute top-3 right-3 w-5 h-5 bg-brand-200 rounded-full hidden items-center justify-center z-10 shadow-lg"><svg class="w-3 h-3 text-brand-950" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg></div>
                    </div>
                </div>
                <button id="btn-analyze-deep" onclick="startDeepAnalysis()" class="w-full py-4 mt-2 bg-brand-100 text-brand-950 rounded-2xl text-[13px] tracking-wide font-medium opacity-30 cursor-not-allowed transition-all" disabled data-i18n="analyze_btn">양손 분석 시작하기</button>
            </div>

            <input type="file" id="camera-input-quick" accept="image/*" class="hidden" onchange="handleImageUpload(event, 'quick')">
            <input type="file" id="camera-input-left" accept="image/*" class="hidden" onchange="handleImageUpload(event, 'left')">
            <input type="file" id="camera-input-right" accept="image/*" class="hidden" onchange="handleImageUpload(event, 'right')">
        </section>

        <!-- 로딩 화면 (미니멀) -->
        <section id="loading-section" class="hidden absolute inset-0 flex-col items-center justify-center bg-brand-950/95 backdrop-blur-md z-30">
            <div class="w-full max-w-[160px] h-[1px] bg-brand-800 overflow-hidden relative">
                <div class="absolute top-0 left-0 h-full bg-brand-300 animate-loading-bar shadow-[0_0_15px_rgba(255,255,255,0.5)]"></div>
            </div>
            <p class="mt-6 text-[10px] uppercase tracking-[0.4em] text-brand-400 font-light" id="loading-text" data-i18n="loading">ANALYZING LINES</p>
        </section>

        <!-- 결과 화면 -->
        <section id="result-section" class="hidden w-full flex-col space-y-10 pb-12 z-10 fade-in pt-4">
            
            <div class="relative w-full aspect-[4/3] rounded-[2rem] overflow-hidden bg-brand-900 border border-brand-800/50 shadow-2xl">
                <img id="preview-image-result" src="" alt="Analyzed Palm" class="w-full h-full object-cover opacity-60 mix-blend-luminosity grayscale scale-105 filter contrast-125">
                <div class="absolute inset-0 bg-gradient-to-t from-brand-950 via-brand-950/40 to-transparent"></div>
                
                <!-- Dopamine visual glow overlay -->
                <div class="absolute inset-0 bg-brand-200/5 mix-blend-overlay animate-pulse"></div>

                <div class="absolute top-6 left-6">
                    <span class="text-[9px] uppercase tracking-[0.2em] bg-brand-950/90 px-4 py-2 rounded-full text-brand-300 backdrop-blur-md border border-brand-800/50 shadow-lg" data-i18n="analysis_comp">Analysis Complete</span>
                </div>
            </div>

            <div class="space-y-10 px-1">
                <div class="space-y-6">
                    <div class="border-b border-brand-800 pb-3 flex items-center justify-between">
                        <div>
                            <h3 class="text-[10px] uppercase tracking-widest text-brand-500 mb-1">Index</h3>
                            <p class="text-sm font-medium text-brand-200 tracking-wide" data-i18n="idx_title">잠재력 지표</p>
                        </div>
                        <div class="w-6 h-6 rounded-full border border-brand-800 flex items-center justify-center">
                            <div class="w-2 h-2 bg-brand-300 rounded-full animate-ping"></div>
                        </div>
                    </div>
                    
                    <div class="space-y-6">
                        <div class="group">
                            <div class="flex justify-between mb-2 text-[11px] font-light uppercase tracking-wider">
                                <span class="text-brand-400" data-i18n="vitality">Vitality (생명)</span>
                                <span class="text-brand-100 font-medium" id="stat-vitality-val">0</span>
                            </div>
                            <div class="w-full bg-brand-900 h-[1px] overflow-hidden relative">
                                <div id="stat-vitality" class="absolute left-0 top-0 bg-brand-200 h-full transition-all duration-1000 ease-out shadow-[0_0_10px_rgba(255,255,255,0.8)]" style="width: 0%"></div>
                            </div>
                        </div>
                        
                        <div class="group">
                            <div class="flex justify-between mb-2 text-[11px] font-light uppercase tracking-wider">
                                <span class="text-brand-400" data-i18n="intelligence">Intelligence (두뇌)</span>
                                <span class="text-brand-100 font-medium" id="stat-intelligence-val">0</span>
                            </div>
                            <div class="w-full bg-brand-900 h-[1px] overflow-hidden relative">
                                <div id="stat-intelligence" class="absolute left-0 top-0 bg-brand-200 h-full transition-all duration-1000 ease-out shadow-[0_0_10px_rgba(255,255,255,0.8)]" style="width: 0%"></div>
                            </div>
                        </div>

                        <div class="group">
                            <div class="flex justify-between mb-2 text-[11px] font-light uppercase tracking-wider">
                                <span class="text-brand-400" data-i18n="emotion">Emotion (감정)</span>
                                <span class="text-brand-100 font-medium" id="stat-charm-val">0</span>
                            </div>
                            <div class="w-full bg-brand-900 h-[1px] overflow-hidden relative">
                                <div id="stat-charm" class="absolute left-0 top-0 bg-brand-200 h-full transition-all duration-1000 ease-out shadow-[0_0_10px_rgba(255,255,255,0.8)]" style="width: 0%"></div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="space-y-5">
                    <div class="border-b border-brand-800 pb-3">
                        <h3 class="text-[10px] uppercase tracking-widest text-brand-500 mb-1">Insight</h3>
                        <p class="text-sm font-medium text-brand-200 tracking-wide" data-i18n="ins_title">상세 분석</p>
                    </div>
                    <div id="result-text" class="text-brand-300 text-[14px] leading-[1.85] font-light whitespace-pre-line tracking-wide opacity-90 transition-opacity duration-500">
                    </div>
                </div>

                <!-- 심층 분석 영역 -->
                <div id="deep-dive-section" class="space-y-5 pt-8 border-t border-brand-800/50 hidden fade-in">
                    <p class="text-[11px] text-brand-400 font-light tracking-wide text-center uppercase" data-i18n="deep_title">특정 영역의 더 깊은 분석이 필요하신가요?</p>
                    <div class="grid grid-cols-3 gap-3">
                        <button onclick="analyzeDeepDive('career')" class="relative py-4 border border-brand-800 rounded-2xl text-brand-300 text-[11px] uppercase tracking-widest hover:bg-brand-900 hover:border-brand-600 transition-all group overflow-hidden">
                            <div class="absolute inset-0 bg-gradient-to-t from-brand-800/20 to-transparent opacity-0 group-hover:opacity-100 transition-opacity"></div>
                            <span data-i18n="btn_career">Career<br>사업/직업</span>
                        </button>
                        <button onclick="analyzeDeepDive('wealth')" class="relative py-4 border border-brand-800 rounded-2xl text-brand-300 text-[11px] uppercase tracking-widest hover:bg-brand-900 hover:border-brand-600 transition-all group overflow-hidden">
                            <div class="absolute inset-0 bg-gradient-to-t from-brand-800/20 to-transparent opacity-0 group-hover:opacity-100 transition-opacity"></div>
                            <span data-i18n="btn_wealth">Wealth<br>금전운</span>
                        </button>
                        <button onclick="analyzeDeepDive('love')" class="relative py-4 border border-brand-800 rounded-2xl text-brand-300 text-[11px] uppercase tracking-widest hover:bg-brand-900 hover:border-brand-600 transition-all group overflow-hidden">
                            <div class="absolute inset-0 bg-gradient-to-t from-brand-800/20 to-transparent opacity-0 group-hover:opacity-100 transition-opacity"></div>
                            <span data-i18n="btn_love">Love<br>연애/결혼</span>
                        </button>
                    </div>
                    <div id="deep-dive-result" class="mt-4 text-brand-200 text-[14px] leading-[1.8] font-light whitespace-pre-line tracking-wide opacity-90 hidden bg-brand-900/30 p-6 rounded-3xl border border-brand-800/50 backdrop-blur-sm shadow-inner"></div>
                </div>
            </div>

            <button onclick="resetApp()" class="w-full py-4 mt-6 bg-brand-100 text-brand-950 hover:bg-white rounded-2xl font-medium text-[13px] tracking-wide transition-all shadow-xl shadow-white/5 active:scale-[0.98]" data-i18n="reset_btn">
                새로운 분석 시작
            </button>
        </section>
    </main>

    <script src="app.js?v=7"></script>
</body>
</html>
